<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta Digital - El Passeig</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Fondo oscuro para resaltar la carta */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .carta-container {
            width: 100%;
            max-width: 600px;
            background-color: #fff;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        .seccion-carta {
            width: 100%;
            display: block;
            line-height: 0; /* Evita espacios en blanco entre imágenes */
        }

        .seccion-carta img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="carta-container">
        
        <div class="seccion-carta">
            <img src="PortadaPasseig.jpeg" alt="Portada El Passeig">
        </div>

        <div class="seccion-carta">
            <img src="TapasPasseig.jpeg" alt="Tapas El Passeig">
        </div>

        <div class="seccion-carta">
            <img src="HamburguesasPasseig.jpeg" alt="Hamburguesas El Passeig">
        </div>

        <div class="seccion-carta">
            <img src="MenusPasseig.jpeg" alt="Menus El Passeig">
        </div>

        <div class="seccion-carta">
            <img src="BOcadillosPasseig.jpeg" alt="Bocadillos El Passeig">
        </div>

        </div>

</body>
</html>
